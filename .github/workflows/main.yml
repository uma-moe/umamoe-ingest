name: Build And Deploy Ingest

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

env:
  PLATFORM: linux/amd64
  DEPLOY_USER: github
  REMOTE_IMAGE_DIR: /tmp/umamoe-ingest-images
  IMAGE_NAME: umamoe-ingest
  PROD_CONTAINER_NAME: umamoe-ingest
  BETA_CONTAINER_NAME: umamoe-ingest-beta
  PROD_ENV_FILE: /opt/umamoe-ingest/env
  BETA_ENV_FILE: /opt/umamoe-ingest-beta/env
  PROD_AUTH_BACKEND_INTERNAL_BASE: http://umamoe-backend:3201
  BETA_AUTH_BACKEND_INTERNAL_BASE: http://umamoe-backend-beta:3201
  APP_PORT: '3003'
  BETA_HOST_PORT: '3103'
  PROD_HOST_PORT: '3003'
  SHARED_NETWORK_NAME: umamoe-services
  PROD_SHARED_SERVICE_ALIAS: umamoe-ingest
  BETA_SHARED_SERVICE_ALIAS: umamoe-ingest-beta

jobs:
  build:
    name: Build Ingest Image
    runs-on: ubuntu-latest
    outputs:
      archive_name: ${{ steps.meta.outputs.archive_name }}
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          image_tag="${IMAGE_NAME}:${GITHUB_SHA}"
          archive_name="${IMAGE_NAME}-${GITHUB_SHA}.tar.gz"
          echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"
          echo "archive_name=$archive_name" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ingest image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ env.PLATFORM }}
          load: true
          tags: ${{ steps.meta.outputs.image_tag }}
          cache-from: type=gha,scope=umamoe-ingest-image
          cache-to: type=gha,mode=max,scope=umamoe-ingest-image

      - name: Save ingest image
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          docker save "${{ steps.meta.outputs.image_tag }}" | gzip -1 > "${{ runner.temp }}/${{ steps.meta.outputs.archive_name }}"

      - name: Upload ingest image artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: umamoe-ingest-image
          path: ${{ runner.temp }}/${{ steps.meta.outputs.archive_name }}
          if-no-files-found: error

  deploy_beta:
    name: Deploy Beta
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment: beta

    steps:
      - name: Download ingest image artifact
        uses: actions/download-artifact@v4
        with:
          name: umamoe-ingest-image
          path: ${{ runner.temp }}

      - name: Mask deployment metadata
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          set -euo pipefail

          mask_value() {
            local value="$1"
            if [[ -n "$value" ]]; then
              echo "::add-mask::$value"
            fi
          }

          mask_value "$DEPLOY_HOST"

          while IFS= read -r known_host_line; do
            mask_value "$known_host_line"
            read -r known_host _ key_body _ <<< "$known_host_line"
            mask_value "$known_host"
            mask_value "$key_body"
          done <<< "$DEPLOY_KNOWN_HOSTS"

      - name: Start SSH agent
        shell: bash
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          eval "$(ssh-agent -s)" >/dev/null
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"
          ssh-add - <<< "$DEPLOY_SSH_KEY" >/dev/null 2>&1

      - name: Configure known hosts
        shell: bash
        env:
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          if [ -z "$DEPLOY_KNOWN_HOSTS" ]; then
            echo "DEPLOY_KNOWN_HOSTS is required for deploy host verification." >&2
            exit 1
          fi
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy beta container
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
          ARCHIVE_NAME: ${{ needs.build.outputs.archive_name }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
          HOST_PORT: ${{ env.BETA_HOST_PORT }}
          CONTAINER_NAME: ${{ env.BETA_CONTAINER_NAME }}
          APP_PORT: ${{ env.APP_PORT }}
          ENV_FILE: ${{ env.BETA_ENV_FILE }}
          AUTH_BACKEND_INTERNAL_BASE: ${{ env.BETA_AUTH_BACKEND_INTERNAL_BASE }}
          SHARED_NETWORK_NAME: ${{ env.SHARED_NETWORK_NAME }}
          SHARED_SERVICE_ALIAS: ${{ env.BETA_SHARED_SERVICE_ALIAS }}
        run: |
          set -euo pipefail

          remote_archive="${REMOTE_IMAGE_DIR}/${ARCHIVE_NAME}"

          ssh -o LogLevel=ERROR -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$REMOTE_IMAGE_DIR'"
          rsync -az -e "ssh -o LogLevel=ERROR -p $DEPLOY_PORT" "${{ runner.temp }}/${ARCHIVE_NAME}" "$DEPLOY_USER@$DEPLOY_HOST:$remote_archive"

          ssh -o LogLevel=ERROR -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" 'bash -s' -- \
            "$remote_archive" "$IMAGE_TAG" "$CONTAINER_NAME" "$APP_PORT" "$HOST_PORT" "$ENV_FILE" "$AUTH_BACKEND_INTERNAL_BASE" "$SHARED_NETWORK_NAME" "$SHARED_SERVICE_ALIAS" <<'REMOTE_SCRIPT'
          set -euo pipefail

          archive="$1"
          image_tag="$2"
          container_name="$3"
          app_port="$4"
          host_port="$5"
          env_file="$6"
          auth_backend_internal_base="$7"
          shared_network_name="$8"
          shared_service_alias="$9"

          if [ ! -f "$env_file" ]; then
            echo "Missing container env file: $env_file" >&2
            exit 1
          fi

          gzip -dc "$archive" | docker load
          docker network create "$shared_network_name" >/dev/null 2>&1 || true

          docker rm -f "$container_name" >/dev/null 2>&1 || true
          docker run -d \
            --name "$container_name" \
            --restart unless-stopped \
            --network "$shared_network_name" \
            --network-alias "$shared_service_alias" \
            --add-host host.docker.internal:host-gateway \
            --env-file "$env_file" \
            -e HOST=0.0.0.0 \
            -e PORT="$app_port" \
            -e AUTH_BACKEND_INTERNAL_BASE="$auth_backend_internal_base" \
            -p "127.0.0.1:${host_port}:${app_port}" \
            "$image_tag"

          for _ in $(seq 1 60); do
            running="$(docker inspect --format '{{.State.Running}}' "$container_name" 2>/dev/null || true)"
            health="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$container_name" 2>/dev/null || true)"

            if [ "$health" = "healthy" ]; then
              rm -f "$archive"
              docker image prune -f --filter "until=168h" >/dev/null 2>&1 || true
              exit 0
            fi

            if [ "$running" != "true" ]; then
              docker logs --tail=120 "$container_name" || true
              exit 1
            fi

            sleep 2
          done

          docker logs --tail=120 "$container_name" || true
          exit 1
          REMOTE_SCRIPT

  deploy_production:
    name: Deploy Production
    if: always() && github.event_name != 'pull_request' && needs.deploy_beta.result == 'success'
    needs:
      - build
      - deploy_beta
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Download ingest image artifact
        uses: actions/download-artifact@v4
        with:
          name: umamoe-ingest-image
          path: ${{ runner.temp }}

      - name: Mask deployment metadata
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          set -euo pipefail

          mask_value() {
            local value="$1"
            if [[ -n "$value" ]]; then
              echo "::add-mask::$value"
            fi
          }

          mask_value "$DEPLOY_HOST"

          while IFS= read -r known_host_line; do
            mask_value "$known_host_line"
            read -r known_host _ key_body _ <<< "$known_host_line"
            mask_value "$known_host"
            mask_value "$key_body"
          done <<< "$DEPLOY_KNOWN_HOSTS"

      - name: Start SSH agent
        shell: bash
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          eval "$(ssh-agent -s)" >/dev/null
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"
          ssh-add - <<< "$DEPLOY_SSH_KEY" >/dev/null 2>&1

      - name: Configure known hosts
        shell: bash
        env:
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          if [ -z "$DEPLOY_KNOWN_HOSTS" ]; then
            echo "DEPLOY_KNOWN_HOSTS is required for deploy host verification." >&2
            exit 1
          fi
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy production container
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
          ARCHIVE_NAME: ${{ needs.build.outputs.archive_name }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
          HOST_PORT: ${{ env.PROD_HOST_PORT }}
          CONTAINER_NAME: ${{ env.PROD_CONTAINER_NAME }}
          APP_PORT: ${{ env.APP_PORT }}
          ENV_FILE: ${{ env.PROD_ENV_FILE }}
          AUTH_BACKEND_INTERNAL_BASE: ${{ env.PROD_AUTH_BACKEND_INTERNAL_BASE }}
          SHARED_NETWORK_NAME: ${{ env.SHARED_NETWORK_NAME }}
          SHARED_SERVICE_ALIAS: ${{ env.PROD_SHARED_SERVICE_ALIAS }}
        run: |
          set -euo pipefail

          remote_archive="${REMOTE_IMAGE_DIR}/${ARCHIVE_NAME}"

          ssh -o LogLevel=ERROR -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$REMOTE_IMAGE_DIR'"
          rsync -az -e "ssh -o LogLevel=ERROR -p $DEPLOY_PORT" "${{ runner.temp }}/${ARCHIVE_NAME}" "$DEPLOY_USER@$DEPLOY_HOST:$remote_archive"

          ssh -o LogLevel=ERROR -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" 'bash -s' -- \
            "$remote_archive" "$IMAGE_TAG" "$CONTAINER_NAME" "$APP_PORT" "$HOST_PORT" "$ENV_FILE" "$AUTH_BACKEND_INTERNAL_BASE" "$SHARED_NETWORK_NAME" "$SHARED_SERVICE_ALIAS" <<'REMOTE_SCRIPT'
          set -euo pipefail

          archive="$1"
          image_tag="$2"
          container_name="$3"
          app_port="$4"
          host_port="$5"
          env_file="$6"
          auth_backend_internal_base="$7"
          shared_network_name="$8"
          shared_service_alias="$9"

          if [ ! -f "$env_file" ]; then
            echo "Missing container env file: $env_file" >&2
            exit 1
          fi

          gzip -dc "$archive" | docker load
          docker network create "$shared_network_name" >/dev/null 2>&1 || true

          docker rm -f "$container_name" >/dev/null 2>&1 || true
          docker run -d \
            --name "$container_name" \
            --restart unless-stopped \
            --network "$shared_network_name" \
            --network-alias "$shared_service_alias" \
            --add-host host.docker.internal:host-gateway \
            --env-file "$env_file" \
            -e HOST=0.0.0.0 \
            -e PORT="$app_port" \
            -e AUTH_BACKEND_INTERNAL_BASE="$auth_backend_internal_base" \
            -p "127.0.0.1:${host_port}:${app_port}" \
            "$image_tag"

          for _ in $(seq 1 60); do
            running="$(docker inspect --format '{{.State.Running}}' "$container_name" 2>/dev/null || true)"
            health="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$container_name" 2>/dev/null || true)"

            if [ "$health" = "healthy" ]; then
              rm -f "$archive"
              docker image prune -f --filter "until=168h" >/dev/null 2>&1 || true
              exit 0
            fi

            if [ "$running" != "true" ]; then
              docker logs --tail=120 "$container_name" || true
              exit 1
            fi

            sleep 2
          done

          docker logs --tail=120 "$container_name" || true
          exit 1
          REMOTE_SCRIPT
